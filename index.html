<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── THEME SYSTEM ── */
        :root, [data-theme="light"] {
            --primary: #0095F6; 
            --background: #F3F4F6; 
            --surface: #FFFFFF; 
            --surface-hover: #F9FAFB;
            --border: #E5E7EB; 
            --text-primary: #111827; 
            --text-secondary: #6B7280; 
            --text-muted: #9CA3AF;
            --like: #FF3040;
            --bubble-out: linear-gradient(135deg, #0095F6 0%, #3B82F6 100%);
            --bubble-in: #F3F4F6; 
            --bubble-out-text: #FFFFFF; 
            --bubble-in-text: #111827;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); 
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        [data-theme="dark"] {
            --primary: #3B82F6; 
            --background: #111827; 
            --surface: #1F2937; 
            --surface-hover: #374151;
            --border: #374151; 
            --text-primary: #F9FAFB; 
            --text-secondary: #9CA3AF; 
            --text-muted: #6B7280;
            --like: #ED4956;
            --bubble-out: linear-gradient(135deg, #3B82F6 0%, #6366F1 100%); 
            --bubble-in: #374151; 
            --bubble-out-text: #FFFFFF; 
            --bubble-in-text: #F9FAFB;
            --glass-bg: rgba(31, 41, 55, 0.85);
        }

        /* ── RESET & BASE ── */
        *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
        .bubble, .msg-input, textarea, input[type="text"] { -webkit-user-select:text; user-select:text; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--text-primary); height: 100vh; overflow: hidden; transition:background 0.3s,color 0.3s;}

        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes badgePop{from{transform:scale(0);}80%{transform:scale(1.15);}to{transform:scale(1);}}

        .shimmer{ background:linear-gradient(90deg,var(--surface-hover) 25%,var(--border) 50%,var(--surface-hover) 75%); background-size:200% 100%; animation:shimmer 1.6s infinite; border-radius:6px; }

        /* ── APP SHELL ── */
        .app { display: flex; height: 100%; max-width: 1200px; margin: 0 auto; background: var(--surface); box-shadow: var(--shadow-lg); }
        @media(min-width: 1000px) { .app { margin: 20px auto; height: calc(100% - 40px); border-radius: 24px; overflow: hidden; border: 1px solid var(--border); } }

        /* ── SIDEBAR ── */
        .sidebar { width: 350px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-right: 1px solid var(--border); transition: transform 0.3s ease; }
        @media(max-width:768px){ .sidebar { position: fixed; inset: 0; width: 100%; z-index: 10; } .sidebar.slide-out { transform: translateX(-100%); } }

        .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top) + 24px) 24px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .sidebar-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { background: var(--surface-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .conv-list { overflow-y: auto; flex: 1; padding: 12px; overscroll-behavior: contain; }
        .conv-list::-webkit-scrollbar{width:0;}
        
        .conv-item { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; animation:fadeUp 0.3s ease-out both; position: relative;}
        .conv-item:hover { background: var(--surface-hover); }
        .conv-item.active { background: var(--surface-hover); box-shadow: var(--shadow-sm); }
        .conv-avatar-wrap { position: relative; flex-shrink: 0; }
        .conv-avatar { width: 56px; height: 56px; border-radius: 20px; object-fit: cover; background: var(--surface-hover); }
        .conv-item.unread .conv-avatar { padding: 2px; border: 2px solid var(--primary); }
        
        .conv-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .conv-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conv-item.unread .conv-name { font-weight: 700; }
        .conv-preview-row { display: flex; align-items: center; gap: 6px; }
        .conv-preview { font-size: 14px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .conv-item.unread .conv-preview { color: var(--text-primary); font-weight: 600; }
        .conv-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }

        .unread-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); display: none; flex-shrink: 0; animation: badgePop 0.3s ease-out; }
        .conv-item.unread .unread-dot { display: block; }

        /* ── CHAT PANE ── */
        .chat-pane { flex: 1; display: flex; flex-direction: column; background: var(--background); position: relative; min-width: 0; }
        @media(max-width:768px){ .chat-pane { position: fixed; inset: 0; z-index: 200; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); } .chat-pane.open { transform: translateX(0); } }

        /* ── GLASS HEADER ── */
        .chat-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: calc(env(safe-area-inset-top) + 16px) 24px 16px;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .chat-header-center { display: flex; flex-direction: column; align-items: center; flex: 1; cursor: pointer; min-width: 0; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 14px; margin-bottom: 4px; object-fit: cover; }
        .chat-name { font-size: 16px; font-weight: 700; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-sub { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .chat-sub.online-text { color: var(--primary); }

        /* ── AI TOGGLE ── */
        .ai-toggle-container { display: flex; align-items: center; gap: 8px; background: var(--surface-hover); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
        .switch { position: relative; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: linear-gradient(135deg, #C5A059, #8E6E37); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* ── MESSAGES AREA ── */
        .messages-area {
            flex: 1; overflow-y: auto; padding: 120px 24px 100px; 
            display: flex; flex-direction: column; gap: 6px; overscroll-behavior: contain;
        }
        .messages-area::-webkit-scrollbar { width: 0; }
        
        .chat-profile-header { display: flex; flex-direction: column; align-items: center; padding: 20px 20px 40px; text-align: center; }
        .chat-profile-header img { width: 96px; height: 96px; border-radius: 32px; object-fit: cover; margin-bottom: 16px; box-shadow: var(--shadow-md); }
        .chat-profile-header .name { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .chat-profile-header .handle { font-size: 15px; color: var(--text-secondary); margin-top: 4px; }
        .chat-profile-header .btn { margin-top: 16px; background: var(--surface-hover); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; color: var(--text-primary); transition: 0.2s;}
        .chat-profile-header .btn:hover { background: var(--border); }

        .date-sep{ align-self:center; color:var(--text-secondary); font-size:12px; font-weight:600; padding:6px 16px; margin:24px 0; background: var(--surface-hover); border-radius: 20px; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px; animation:msgIn 0.2s cubic-bezier(0.34,1.2,0.64,1); width: 100%; }
        .msg-row.in { justify-content: flex-start; }
        .msg-row.out { justify-content: flex-end; }
        .msg-row.gap { margin-top: 16px; }

        .msg-avatar-sm { width: 28px; height: 28px; border-radius: 10px; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .msg-avatar-sm.hidden { opacity: 0; pointer-events: none; }
        .msg-row.out .msg-avatar-sm { display: none; }

        .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
        .msg-row.in .msg-content { align-items: flex-start; }
        .msg-row.out .msg-content { align-items: flex-end; }

        .bubble { padding: 14px 18px; font-size: 15px; line-height: 1.5; box-shadow: var(--shadow-sm); word-break: break-word; }
        .msg-row.in .bubble { background: var(--bubble-in); color: var(--bubble-in-text); border-radius: 20px 20px 20px 4px; }
        .msg-row.out .bubble { background: var(--bubble-out); color: var(--bubble-out-text); border-radius: 20px 20px 4px 20px; }
        .msg-row.single .bubble { border-radius: 20px; }

        .msg-meta { display: none; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); padding: 0 4px; }
        .msg-row:hover .msg-meta { display: flex; }
        .msg-row.out .msg-meta { flex-direction: row-reverse; }

        /* ── FLOATING INPUT AREA ── */
        .input-area-wrapper { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, var(--background) 70%, transparent); pointer-events: none; }
        .input-area-wrapper > * { pointer-events: auto; }
        
        .suggestions-bar { display: flex; gap: 8px; padding: 0 0 12px 0; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .suggestions-bar::-webkit-scrollbar { display: none; }
        .suggestion-pill { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); padding: 10px 16px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; animation: msgIn 0.3s ease-out; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 6px; }
        .suggestion-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .suggestion-pill.generating { pointer-events: none; color: var(--text-secondary); }

        .input-wrap {
            display: flex; align-items: flex-end; background: var(--surface);
            border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px; gap: 12px;
            box-shadow: var(--shadow-md); transition: 0.3s; margin-bottom: calc(env(safe-area-inset-bottom));
        }
        .input-wrap:focus-within { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .msg-input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: 'Inter', sans-serif; max-height: 120px; padding: 10px 0; color: var(--text-primary); resize: none; line-height: 1.4;}
        .msg-input::placeholder { color: var(--text-muted); }
        
        .send-btn-icon { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; margin-bottom: 2px;}
        .send-btn-icon.show { display: flex; }
        .send-btn-icon:active { transform: scale(0.9); }

        /* ── STICKER PICKER ── */
        .sticker-picker { position: absolute; bottom: calc(100% + 10px); left: 20px; width: 280px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow-lg); padding: 16px; display: none; z-index: 100; animation: fadeUp 0.2s ease-out; }
        .sticker-picker.show { display: block; }
        .sticker-picker-header { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
        .sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-height: 200px; overflow-y: auto; }
        .sticker-grid::-webkit-scrollbar { width: 0; }
        .sticker-item { width: 100%; aspect-ratio: 1; cursor: pointer; border-radius: 12px; transition: 0.2s; padding: 6px; object-fit: contain; }
        .sticker-item:hover { transform: scale(1.15); background: var(--surface-hover); }

        /* ── MODALS & OVERLAYS ── */
        .confirm-modal-overlay, .modal-overlay, .avatar-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 3000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .confirm-modal-overlay.open, .modal-overlay.open, .avatar-modal.open { opacity: 1; pointer-events: all; }
        
        .confirm-modal { background: var(--surface); width: 90%; max-width: 320px; border-radius: 24px; padding: 24px; text-align: center; transform: scale(0.95); transition: transform 0.2s; box-shadow: var(--shadow-lg); }
        .confirm-modal-overlay.open .confirm-modal { transform: scale(1); }
        .confirm-modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .confirm-modal p { font-size: 15px; color: var(--text-secondary); margin-bottom: 24px; }
        .confirm-modal-actions { display: flex; gap: 12px; }
        .confirm-modal-btn { flex: 1; padding: 14px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .confirm-modal-btn.cancel { background: var(--surface-hover); color: var(--text-primary); }
        .confirm-modal-btn.danger { background: var(--like); color: white; }

        .modal-overlay { align-items: flex-end; z-index: 1000; }
        .modal-box { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; height: 85vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1); padding-bottom: env(safe-area-inset-bottom); }
        .modal-overlay.open .modal-box { transform: translateY(0); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; flex: 1; }
        .modal-search { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .modal-search-input { width: 100%; border: none; outline: none; background: var(--surface-hover); padding: 12px 20px; border-radius: 20px; font-size: 15px; color: var(--text-primary); }
        .users-list { overflow-y: auto; flex: 1; padding: 12px; }
        .user-item { display: flex; align-items: center; gap: 16px; padding: 12px; cursor: pointer; border-radius: 16px; transition: 0.2s; }
        .user-item:hover { background: var(--surface-hover); }
        .user-item-avatar { width: 48px; height: 48px; border-radius: 16px; object-fit: cover; }
        .user-item-name { font-size: 15px; font-weight: 600; }
        .user-item-username { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }

        .avatar-modal { z-index: 2000; background: rgba(0,0,0,0.92); padding: 20px; }
        .avatar-modal-img { max-width: 100%; max-height: 90vh; border-radius: 16px; object-fit: contain; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1); }
        .avatar-modal.open .avatar-modal-img { transform: scale(1); }
        .avatar-modal-close { position: absolute; top: calc(env(safe-area-inset-top) + 20px); right: 20px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-primary); color: var(--surface); padding: 14px 28px; border-radius: 9999px; font-weight: 600; opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 9999; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg); font-size: 14px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="confirm-modal-overlay" id="confirm-overlay" onclick="closeConfirm(event)">
    <div class="confirm-modal">
        <h3 id="confirm-title">Title</h3>
        <p id="confirm-desc">Description</p>
        <div class="confirm-modal-actions">
            <button class="confirm-modal-btn cancel" onclick="closeConfirm()">Cancel</button>
            <button class="confirm-modal-btn danger" onclick="executeConfirm()">Delete</button>
        </div>
    </div>
</div>

<div class="avatar-modal" id="avatar-modal" onclick="closeAvatarModal()">
    <button class="avatar-modal-close" onclick="closeAvatarModal()">
        <i data-feather="x"></i>
    </button>
    <img class="avatar-modal-img" id="avatar-modal-img" src="" alt="">
</div>

<div class="modal-overlay" id="new-chat-modal" onclick="onNewChatOverlayClick(event)">
    <div class="modal-box">
        <div class="modal-header">
            <div style="width:24px;"></div>
            <span class="modal-title">New Message</span>
            <button class="icon-btn" onclick="closeNewChat()">
                <i data-feather="x"></i>
            </button>
        </div>
        <div class="modal-search">
            <input class="modal-search-input" id="new-chat-search" placeholder="Search users..." oninput="filterUsers(this.value)">
        </div>
        <div class="users-list" id="users-list">
            <div style="padding: 30px;"><div class="spinner"></div></div>
        </div>
    </div>
</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title" id="me-username">Vynix</span>
            <button class="icon-btn" onclick="openNewChat()" title="New Message">
                <i data-feather="edit-3"></i>
            </button>
        </div>
        <div class="conv-list" id="conv-list">
            <div id="skeletons" style="padding: 12px;">
                <div style="display:flex;gap:16px;align-items:center;">
                    <div class="shimmer" style="width:56px;height:56px;border-radius:20px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:50%;margin-bottom:10px;"></div><div class="shimmer" style="height:12px;width:80%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-pane" id="chat-pane">
        <div class="chat-empty" id="chat-empty" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align: center;">
            <i data-feather="message-square" style="width:48px;height:48px; color:var(--text-muted); margin-bottom:16px;"></i>
            <h3 style="font-weight: 700; font-size: 20px; margin-bottom: 8px;">Your Messages</h3>
            <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 15px;">End-to-end encrypted conversations.</p>
            <button style="padding: 12px 24px; border-radius: 24px; background: var(--primary); color: white; border: none; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-md);" onclick="openNewChat()">Start a chat</button>
        </div>

        <div id="chat-view" style="display:none; height:100%; flex-direction:column; position: relative;">
            
            <div class="chat-header">
                <button class="icon-btn" onclick="closeChat()">
                    <i data-feather="chevron-left"></i>
                </button>
                
                <div class="chat-header-center" onclick="goToOtherProfile()">
                    <img id="chat-avatar" class="chat-avatar" src="" alt="">
                    <div class="chat-name" id="chat-name">—</div>
                    <div class="chat-sub" id="chat-last-seen">Active today</div>
                </div>

                <div class="chat-actions" style="display: flex; gap: 8px; align-items: center;">
                    <div class="ai-toggle-container" id="ai-toggle-container" title="Let Ona AI reply for you">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="url(#gemini-gradient)" stroke="none">
                            <defs>
                                <linearGradient id="gemini-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#C5A059" />
                                    <stop offset="100%" stop-color="#8E6E37" />
                                </linearGradient>
                            </defs>
                            <path d="M11.5 2C11.5 7.24671 7.24671 11.5 2 11.5C7.24671 11.5 11.5 15.7533 11.5 21C11.5 15.7533 15.7533 11.5 21 11.5C15.7533 11.5 11.5 7.24671 11.5 2Z"></path>
                            <path d="M20 4C20 5.65685 18.6569 7 17 7C18.6569 7 20 8.34315 20 10C20 8.34315 21.3431 7 23 7C21.3431 7 20 5.65685 20 4Z"></path>
                        </svg>
                        <label class="switch">
                          <input type="checkbox" id="ai-toggle" onchange="toggleAImode()">
                          <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="messages-area" id="messages-area"></div>

            <div class="typing-slot" id="typing-slot" style="padding: 0 24px; display: none;">
                <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 120px; font-weight: 500;">Typing...</div>
            </div>

            <div class="input-area-wrapper">
                <div class="suggestions-bar" id="ai-suggestions-container" style="display:none; margin-bottom: 12px;"></div>
                
                <div class="sticker-picker" id="sticker-picker">
                    <div class="sticker-picker-header">Stickers</div>

function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_DB,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}

async function getOrCreateKP(uid){const stored=await idbGet(`kp-${uid}`);if(stored)return stored;const kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveKey','deriveBits']);await idbSet(`kp-${uid}`,kp);return kp;}

async function importPub(b64){return crypto.subtle.importKey('spki',b64d(b64),{name:'ECDH',namedCurve:'P-256'},true,[]);}

async function getSharedKey(myKp,otherPubB64){if(skCache[otherPubB64])return skCache[otherPubB64];const pub=await importPub(otherPubB64);const bits=await crypto.subtle.deriveBits({name:'ECDH',public:pub},myKp.privateKey,256);const k=await crypto.subtle.importKey('raw',bits,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);skCache[otherPubB64]=k;return k;}
async function encMsg(sk,plain){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},sk,new TextEncoder().encode(plain));return{iv:b64e(iv),ct:b64e(ct)};}

async function callAIApi(messages, systemPrompt) {
    if (!XAI_API_KEY) return null;
    try {
        const res = await fetch(`${API_BASE}/chat/completions`, {
            method: 'POST', headers: { 'Authorization': `Bearer ${XAI_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "grok-4-1-fast-reasoning", messages: [ { role: "system", content: systemPrompt }, ...messages ] })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json(); return data.choices[0].message.content;
    } catch (e) { console.error("AI Error:", e); return null; }
}

    const aiResponseText = await callAIApi(getRecentContext(), systemPrompt);

    if (aiResponseText) await window.sendMessage(aiResponseText);
}

    const systemPrompt = `Generate exactly 3 short, distinct reply options. Output ONLY a valid JSON array of 3 strings. e.g. ["Yes!", "No thanks.", "Maybe later."]`;
    const aiResponseText = await callAIApi(getRecentContext(), systemPrompt);
    isAIGenerating = false;
    if (aiResponseText) {
        try {
            const suggestions = JSON.parse(aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim());
            if (Array.isArray(suggestions)) {
                container.innerHTML = suggestions.map(text => `<div class="suggestion-pill" onclick="sendSuggestion(this, \`${window.escapeHtml(text)}\`)"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color:var(--primary);"><path d="M11.5 2C11.5 7.24671 7.24671 11.5 2 11.5C7.24671 11.5 11.5 15.7533 11.5 21C11.5 15.7533 15.7533 11.5 21 11.5C15.7533 11.5 11.5 7.24671 11.5 2Z"></path></svg>${window.escapeHtml(text)}</div>`).join('');
                return;
            }
        } catch (e) {}
    }
    container.style.display = 'none';
}

        msgData.text = text; previewUpdates.lastMsg = text;
        await push(ref(db,`messages/${chatId}/msgs`),msgData);
        await update(ref(db, `userChats/${me.uid}/${chatId}`), previewUpdates);
        scrollBot();
        
        document.getElementById('typing-slot').style.display = 'block';
        const aiResponseText = await callAIApi([...getRecentContext(), {role: 'user', content: text}], "You are Ona AI, built into Vynix Chat. Be conversational, short, and helpful.");
        document.getElementById('typing-slot').style.display = 'none';

        if (aiResponseText) {
            const aiTs = Date.now();
            await push(ref(db, `messages/${chatId}/msgs`), { senderId: 'ai_system', timestamp: aiTs, text: aiResponseText, read: true });
            await update(ref(db, `userChats/${me.uid}/${chatId}`), { lastTs: aiTs, lastMsg: aiResponseText });
        }
        return;
    }
    
    // 2. Normal E2E Chat Logic
    if(chatSK){
        const enc=await encMsg(chatSK,text), pEnc=await encMsg(chatSK,text);
        msgData.iv=enc.iv; msgData.ct=enc.ct;
        previewUpdates.lastIv=pEnc.iv; previewUpdates.lastCt=pEnc.ct; previewUpdates.lastMsg='';
    } else { msgData.text=text; previewUpdates.lastMsg=text; }
    
    await push(ref(db,`messages/${chatId}/msgs`),msgData);
    const ocSnap=await get(ref(db,`userChats/${otherUid}/${chatId}`));
    const pU=(ocSnap.exists()?ocSnap.val().unreadCount:0)||0;
    const upd={};
    upd[`userChats/${me.uid}/${chatId}`]={...previewUpdates,otherUid,unreadCount:0};
    upd[`userChats/${otherUid}/${chatId}`]={...previewUpdates,otherUid:me.uid,unreadCount:pU+1};
    await update(ref(db),upd); scrollBot();
};

window.onMsgInput=()=>{ resizeInput(); const h=document.getElementById('msg-input').value.trim().length>0; const btn=document.getElementById('send-btn'); if(h){btn.classList.add('show');btn.disabled=false;startTyping();}else{btn.classList.remove('show');btn.disabled=true;stopTyping();} };
window.onMsgKeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendMessage();}};
function resizeInput(){const el=document.getElementById('msg-input');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function startTyping(){if(!chatId || otherUid === 'ai_system')return;set(ref(db,`messages/${chatId}/typing/${me.uid}`),true);clearTimeout(typingTimer);typingTimer=setTimeout(stopTyping,3000);}
function stopTyping(){if(!chatId || otherUid === 'ai_system')return;remove(ref(db,`messages/${chatId}/typing/${me.uid}`));clearTimeout(typingTimer);}
function listenTyping(cid,uid){onValue(ref(db,`messages/${cid}/typing/${uid}`),snap=>{const sl=document.getElementById('typing-slot');if(snap.exists()){sl.style.display='block';scrollBot();}else sl.style.display='none';});}

// ── LISTEN MSGS & RENDER ──
function listenMsgs(cid){
    loadedIds.clear();
    onChildAdded(ref(db,`messages/${cid}/msgs`), snap => {
        if(loadedIds.has(snap.key))return; loadedIds.add(snap.key);
        const msg = snap.val();
        if (msg.senderId !== me.uid && !msg.read) update(ref(db, `messages/${cid}/msgs/${snap.key}`), {read: true}).catch(()=>{});
        
        const area = document.getElementById('messages-area');
        const msgDate = new Date(msg.timestamp || Date.now()).toDateString();
        const lastSep = area.querySelector('.date-sep:last-of-type');
        if(!lastSep || lastSep.dataset.date !== msgDate){
            const s = document.createElement('div'); s.className = 'date-sep'; s.dataset.date = msgDate; s.textContent = fmtDateSep(msg.timestamp); area.appendChild(s);
        }
        const row = document.createElement('div'); row.id = `msg-${snap.key}`; row.dataset.sender = msg.senderId; area.appendChild(row);

        renderMsgContent(row, {id:snap.key,...msg}).then(() => {
            scrollBot();
            if (msg.senderId !== me.uid && chatId === cid && otherUid !== 'ai_system') {
                if (isAIToggledOn) handleAIAutoReply(); else handleAISuggestions();
            }
        });
        if(msg.senderId !== me.uid && chatId === cid) update(ref(db,`userChats/${me.uid}/${cid}`), {unreadCount:0}).catch(()=>{});
    });

    onChildChanged(ref(db,`messages/${cid}/msgs`), snap => {
        const msg = snap.val();
        if (msg.senderId === me.uid && msg.read) { const row = document.getElementById(`msg-${snap.key}`); if (row) { const tick = row.querySelector('.msg-tick svg'); if (tick) tick.setAttribute('stroke', 'var(--primary)'); } }
    });
}

async function renderMsgContent(row, msg) {
    const isMine = msg.senderId === me.uid;
    const prevRow = row.previousElementSibling;
    let isSingle = true;
    if (prevRow && prevRow.classList.contains('msg-row')) isSingle = prevRow.dataset.sender !== msg.senderId;

    row.className = `msg-row ${isMine ? 'out' : 'in'} ${isSingle ? 'single gap' : ''}`;
    const avSrc = isMine ? (meData?.photoURL||au(meData)) : (otherData?.photoURL||au(otherData));
    const showAv = !isMine && isSingle;

    let displayText='', isImg=false;
    if(msg.iv && msg.ct && otherUid !== 'ai_system'){ displayText = chatSK ? await decMsg(chatSK,msg.iv,msg.ct) : '🔒 Encrypted'; } 
    else if(msg.imageUrl){ isImg = true; displayText = msg.imageUrl; } 
    else { displayText = msg.text || ''; }

    const bubbleHTML = isImg ? (msg.isSticker ? `<img src="${displayText}" alt="sticker" style="width:110px;height:110px;object-fit:contain;margin:4px 0;">` : `<img src="${displayText}" alt="" style="max-width:240px;border-radius:16px;cursor:pointer;border:1px solid var(--border);" onclick="openAvatarModal('${displayText}')">`) : `<div class="bubble">${esc(displayText).replace(/\n/g,'<br>')}</div>`;
    
    const tickColor = msg.read ? 'var(--primary)' : 'var(--text-muted)';
    const tickHTML = isMine ? `<span class="msg-tick" style="margin-left:4px;display:flex;align-items:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${tickColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>` : '';
    
    row.innerHTML = `${!isMine ? `<img class="msg-avatar-sm${showAv ? '' : ' hidden'}" src="${avSrc}" alt="">` : ''} <div class="msg-content">${bubbleHTML} <div class="msg-meta"><span>${fmtMsgTime(msg.timestamp)}</span>${tickHTML}</div></div>`;
}

function scrollBot() { const area = document.getElementById('messages-area'); if(area) setTimeout(() => { area.scrollTo({top: area.scrollHeight, behavior: 'smooth'}); }, 100); }

window.handleImgAttach = async (e) => {
    const file = e.target.files[0]; if (!file || !chatId) return;
    if (otherUid === 'ai_system') { showToast("Ona AI doesn't support images yet!"); return; }
    
    const btn = document.querySelector('.icon-btn'); btn.style.opacity = '0.5'; 
    const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUDINARY_PRESET);
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.secure_url) {
            const ts = Date.now();
            await push(ref(db, `messages/${chatId}/msgs`), { senderId: me.uid, timestamp: ts, imageUrl: data.secure_url, read: false });
            const ocSnap = await get(ref(db, `userChats/${otherUid}/${chatId}`));
            const pU = (ocSnap.exists() ? ocSnap.val().unreadCount : 0) || 0;
            const upd = {}; upd[`userChats/${me.uid}/${chatId}`] = { lastTs: ts, lastMsg: 'Sent an image', otherUid, unreadCount: 0 }; upd[`userChats/${otherUid}/${chatId}`] = { lastTs: ts, lastMsg: 'Sent an image', otherUid: me.uid, unreadCount: pU + 1 };
            await update(ref(db), upd); scrollBot();
        }
    } catch (err) { showToast('Failed to upload image'); } finally { btn.style.opacity = '1'; e.target.value = ''; }
};

window.goToOtherProfile = () => { if(otherData?.username && otherUid !== 'ai_system') window.location.href=`profile.html?id=${otherUid}`; };
window.escapeHtml = (s) => {const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function esc(s){return window.escapeHtml(s);}
function au(u){return`https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.displayName||u.username||u.uid||'U')))}&background=random`;}
function fmtTime(ts){
    if(!ts)return''; const diff=new Date()-new Date(ts);
    const mins=Math.floor(diff/60000), hrs=Math.floor(mins/60), days=Math.floor(hrs/24), wks=Math.floor(days/7);
    if(mins<1)return'now'; if(mins<60)return mins+'m'; if(hrs<24)return hrs+'h'; if(days<7)return days+'d'; return wks+'w';
}
function fmtMsgTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDateSep(ts){
    if(!ts)return'';const d=new Date(ts),now=new Date();
    if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'}) + ', ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
</script>
