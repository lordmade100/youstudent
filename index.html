<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vynix · Messages</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── THEME SYSTEM ── */
        :root, [data-theme="light"] {
            --primary: #0095F6; 
            --background: #F3F4F6; 
            --surface: #FFFFFF; 
            --surface-hover: #F9FAFB;
            --border: #E5E7EB; 
            --text-primary: #111827; 
            --text-secondary: #6B7280; 
            --text-muted: #9CA3AF;
            --like: #FF3040;
            --bubble-out: linear-gradient(135deg, #0095F6 0%, #3B82F6 100%);
            --bubble-in: #F3F4F6; 
            --bubble-out-text: #FFFFFF; 
            --bubble-in-text: #111827;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); 
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        [data-theme="dark"] {
            --primary: #3B82F6; 
            --background: #111827; 
            --surface: #1F2937; 
            --surface-hover: #374151;
            --border: #374151; 
            --text-primary: #F9FAFB; 
            --text-secondary: #9CA3AF; 
            --text-muted: #6B7280;
            --like: #ED4956;
            --bubble-out: linear-gradient(135deg, #3B82F6 0%, #6366F1 100%); 
            --bubble-in: #374151; 
            --bubble-out-text: #FFFFFF; 
            --bubble-in-text: #F9FAFB;
            --glass-bg: rgba(31, 41, 55, 0.85);
            --nav-bg: rgba(31, 41, 55, 0.9);
        }

        /* ── RESET & BASE ── */
        *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
        .bubble, .msg-input, textarea, input[type="text"] { -webkit-user-select:text; user-select:text; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--text-primary); height: 100vh; overflow: hidden; transition:background 0.3s,color 0.3s;}

        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
        @keyframes badgePop{from{transform:scale(0);}80%{transform:scale(1.15);}to{transform:scale(1);}}

        .shimmer{ background:linear-gradient(90deg,var(--surface-hover) 25%,var(--border) 50%,var(--surface-hover) 75%); background-size:200% 100%; animation:shimmer 1.6s infinite; border-radius:6px; }

        /* ── APP SHELL ── */
        .app { display: flex; height: 100%; max-width: 1200px; margin: 0 auto; background: var(--surface); box-shadow: var(--shadow-lg); position: relative; }
        @media(min-width: 1000px) { .app { margin: 20px auto; height: calc(100% - 40px); border-radius: 24px; overflow: hidden; border: 1px solid var(--border); } }

        /* ── SIDEBAR ── */
        .sidebar { width: 350px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-right: 1px solid var(--border); transition: transform 0.3s ease; position: relative; }
        @media(max-width:768px){ .sidebar { position: fixed; inset: 0; width: 100%; z-index: 10; padding-bottom: 80px; } .sidebar.slide-out { transform: translateX(-100%); } }

        .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top) + 24px) 24px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .sidebar-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { background: var(--surface-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .conv-list { overflow-y: auto; flex: 1; padding: 12px; overscroll-behavior: contain; }
        .conv-list::-webkit-scrollbar{width:0;}
        
        .conv-item { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; animation:fadeUp 0.3s ease-out both; position: relative;}
        .conv-item:hover { background: var(--surface-hover); }
        .conv-item.active { background: var(--surface-hover); box-shadow: var(--shadow-sm); }
        .conv-avatar-wrap { position: relative; flex-shrink: 0; }
        .conv-avatar { width: 56px; height: 56px; border-radius: 20px; object-fit: cover; background: var(--surface-hover); }
        
        .conv-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .conv-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conv-preview-row { display: flex; align-items: center; gap: 6px; }
        .conv-preview { font-size: 14px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .conv-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
        .unread-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); display: none; flex-shrink: 0; animation: badgePop 0.3s ease-out; }
        .conv-item.unread .unread-dot { display: block; }

        /* ── FLOATING BOTTOM NAV ── */
        .floating-nav {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 48px); max-width: 400px;
            background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center; padding: 12px 8px;
            box-shadow: var(--shadow-lg); z-index: 50; transition: transform 0.3s ease;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; flex: 1; }
        .nav-item i { width: 22px; height: 22px; }
        .nav-item.active { color: var(--primary); }
        .nav-item:hover { transform: translateY(-2px); color: var(--primary); }
        @media(min-width: 769px) { .floating-nav { display: none; } } /* Hide on desktop */

        /* ── CHAT PANE ── */
        .chat-pane { flex: 1; display: flex; flex-direction: column; background: var(--background); position: relative; min-width: 0; }
        @media(max-width:768px){ .chat-pane { position: fixed; inset: 0; z-index: 200; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); } .chat-pane.open { transform: translateX(0); } }

        /* ── GLASS HEADER w/ SEARCH ── */
        .chat-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: calc(env(safe-area-inset-top) + 16px) 16px 16px;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); transition: all 0.3s ease;
        }
        .chat-header-center { display: flex; flex-direction: column; align-items: flex-start; flex: 1; cursor: pointer; min-width: 0; margin-left: 12px; transition: opacity 0.2s; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 14px; object-fit: cover; }
        .header-profile-wrap { display: flex; align-items: center; gap: 12px; }
        .chat-name { font-size: 16px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-sub { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .chat-sub.online-text { color: var(--primary); }

        /* Search Bar in Header */
        .header-search-container {
            display: none; flex: 1; align-items: center; background: var(--surface-hover);
            border-radius: 20px; padding: 6px 12px; margin: 0 12px; border: 1px solid var(--border);
            animation: fadeUp 0.2s ease;
        }
        .header-search-container.active { display: flex; }
        .header-search-input { flex: 1; border: none; outline: none; background: transparent; color: var(--text-primary); font-size: 14px; margin-left: 8px; }
        .header-search-input::placeholder { color: var(--text-muted); }

        /* ── MESSAGES AREA ── */
        .messages-area {
            flex: 1; overflow-y: auto; padding: 120px 24px 100px; 
            display: flex; flex-direction: column; gap: 6px; overscroll-behavior: contain;
        }
        .messages-area::-webkit-scrollbar { width: 0; }
        .chat-profile-header { display: flex; flex-direction: column; align-items: center; padding: 20px 20px 40px; text-align: center; }
        .chat-profile-header img { width: 96px; height: 96px; border-radius: 32px; object-fit: cover; margin-bottom: 16px; box-shadow: var(--shadow-md); }
        .chat-profile-header .name { font-size: 24px; font-weight: 700; color: var(--text-primary); }
        .chat-profile-header .handle { font-size: 15px; color: var(--text-secondary); margin-top: 4px; }
        
        .date-sep{ align-self:center; color:var(--text-secondary); font-size:12px; font-weight:600; padding:6px 16px; margin:24px 0; background: var(--surface-hover); border-radius: 20px; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 4px; animation:msgIn 0.2s cubic-bezier(0.34,1.2,0.64,1); width: 100%; }
        .msg-row.in { justify-content: flex-start; }
        .msg-row.out { justify-content: flex-end; }
        .msg-row.gap { margin-top: 16px; }
        .msg-row.offline-msg { opacity: 0.7; } /* Visual indicator for pending msgs */

        .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
        .msg-row.in .msg-content { align-items: flex-start; }
        .msg-row.out .msg-content { align-items: flex-end; }

        .bubble { padding: 14px 18px; font-size: 15px; line-height: 1.5; box-shadow: var(--shadow-sm); word-break: break-word; }
        .msg-row.in .bubble { background: var(--bubble-in); color: var(--bubble-in-text); border-radius: 20px 20px 20px 4px; }
        .msg-row.out .bubble { background: var(--bubble-out); color: var(--bubble-out-text); border-radius: 20px 20px 4px 20px; }
        .msg-row.single .bubble { border-radius: 20px; }
        .msg-meta { display: none; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); padding: 0 4px; }
        .msg-row:hover .msg-meta { display: flex; }
        .msg-row.out .msg-meta { flex-direction: row-reverse; }

        /* ── FLOATING INPUT AREA ── */
        .input-area-wrapper { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, var(--background) 70%, transparent); pointer-events: none; }
        .input-area-wrapper > * { pointer-events: auto; }
        .input-wrap {
            display: flex; align-items: flex-end; background: var(--surface);
            border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px; gap: 12px;
            box-shadow: var(--shadow-md); transition: 0.3s; margin-bottom: calc(env(safe-area-inset-bottom));
        }
        .input-wrap:focus-within { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .msg-input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: 'Inter', sans-serif; max-height: 120px; padding: 10px 0; color: var(--text-primary); resize: none; line-height: 1.4;}
        .send-btn-icon { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; margin-bottom: 2px;}
        .send-btn-icon.show { display: flex; }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-primary); color: var(--surface); padding: 14px 28px; border-radius: 9999px; font-weight: 600; opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 9999; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg); font-size: 14px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;}
        
        .offline-banner { display: none; background: #FF9800; color: white; text-align: center; font-size: 12px; padding: 4px; font-weight: 600; position: absolute; top: 0; left: 0; right: 0; z-index: 101; }
        .offline-banner.active { display: block; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="offline-banner" id="offline-banner">You are currently offline. Messages will be sent when connection returns.</div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title" id="me-username">Vynix</span>
            <button class="icon-btn" onclick="openNewChat()" title="New Message">
                <i data-feather="edit-3"></i>
            </button>
        </div>
        <div class="conv-list" id="conv-list">
            <div id="skeletons" style="padding: 12px;">
                <div style="display:flex;gap:16px;align-items:center;">
                    <div class="shimmer" style="width:56px;height:56px;border-radius:20px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="shimmer" style="height:14px;width:50%;margin-bottom:10px;"></div><div class="shimmer" style="height:12px;width:80%;"></div></div>
                </div>
            </div>
        </div>

        <div class="floating-nav">
            <div class="nav-item active"><i data-feather="message-circle"></i><span>Chats</span></div>
            <div class="nav-item"><i data-feather="phone"></i><span>Calls</span></div>
            <div class="nav-item"><i data-feather="users"></i><span>Communities</span></div>
            <div class="nav-item"><i data-feather="settings"></i><span>Settings</span></div>
        </div>
    </div>

    <div class="chat-pane" id="chat-pane">
        <div class="chat-empty" id="chat-empty" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align: center;">
            <i data-feather="message-square" style="width:48px;height:48px; color:var(--text-muted); margin-bottom:16px;"></i>
            <h3 style="font-weight: 700; font-size: 20px; margin-bottom: 8px;">Your Messages</h3>
            <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 15px;">End-to-end encrypted conversations.</p>
            <button style="padding: 12px 24px; border-radius: 24px; background: var(--primary); color: white; border: none; font-weight: 600; font-size: 15px; cursor: pointer;" onclick="openNewChat()">Start a chat</button>
        </div>

        <div id="chat-view" style="display:none; height:100%; flex-direction:column; position: relative;">
            
            <div class="chat-header">
                <button class="icon-btn" onclick="closeChat()">
                    <i data-feather="chevron-left"></i>
                </button>
                
                <div class="header-profile-wrap" id="header-profile-wrap">
                    <img id="chat-avatar" class="chat-avatar" src="" alt="">
                    <div class="chat-header-center" onclick="goToOtherProfile()">
                        <div class="chat-name" id="chat-name">—</div>
                        <div class="chat-sub" id="chat-last-seen">Active today</div>
                    </div>
                </div>

                <div class="header-search-container" id="header-search-container">
                    <i data-feather="search" style="color: var(--text-secondary); width: 16px; height: 16px;"></i>
                    <input type="text" class="header-search-input" id="header-search-input" placeholder="Search...">
                    <i data-feather="x" style="color: var(--text-secondary); width: 16px; height: 16px; cursor: pointer;" onclick="toggleChatSearch()"></i>
                </div>

                <div class="chat-actions" style="display: flex; gap: 4px; align-items: center;" id="chat-header-actions">
                    <button class="icon-btn" onclick="toggleChatSearch()"><i data-feather="search"></i></button>
                    <button class="icon-btn"><i data-feather="more-vertical"></i></button>
                </div>
            </div>

            <div class="messages-area" id="messages-area"></div>

            <div class="input-area-wrapper">
                <div class="input-wrap">
                    <button class="icon-btn" style="width: 36px; height: 36px;" onclick="document.getElementById('img-input').click()"><i data-feather="image"></i></button>
                    <button class="icon-btn" style="width: 36px; height: 36px;"><i data-feather="smile"></i></button>
                    <textarea class="msg-input" id="msg-input" placeholder="Type a message..." rows="1" oninput="onMsgInput()" onkeydown="onMsgKeydown(event)"></textarea>
                    <button class="send-btn-icon" id="send-btn" onclick="sendMessage()"><i data-feather="arrow-up" style="width: 20px; height: 20px;"></i></button>
                </div>
                <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="handleImgAttach(event)">
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, push, update, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const fbCfg={apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878"};
const app=initializeApp(fbCfg), auth=getAuth(app), db=getDatabase(app);

// ── ENCRYPTION & OFFLINE DB SETUP ──
const IDB_DB='vynix-db', IDB_STORE='store';
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_DB,2);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(IDB_STORE))e.target.result.createObjectStore(IDB_STORE);};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function idbGet(k){const d=await openIDB();return new Promise((res,rej)=>{const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function idbSet(k,v){const d=await openIDB();return new Promise((res,rej)=>{const tx=d.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(v,k);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}

let me=null,meData=null, chatId=null,otherUid=null,otherData=null;
let loadedIds=new Set(), currentChatCache = [];

window.showToast = (msg) => { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
window.toggleChatSearch = () => {
    const wrap = document.getElementById('header-profile-wrap');
    const search = document.getElementById('header-search-container');
    const actions = document.getElementById('chat-header-actions');
    const input = document.getElementById('header-search-input');
    if (search.classList.contains('active')) {
        search.classList.remove('active'); wrap.style.display = 'flex'; actions.style.display = 'flex';
        input.value = '';
    } else {
        search.classList.add('active'); wrap.style.display = 'none'; actions.style.display = 'none';
        input.focus();
    }
};

onAuthStateChanged(auth, async user=>{
    if(!user) return; // Add login redirect logic here
    me=user; await loadMe(); listenConvs(); feather.replace();
    syncOfflineData();
});

async function loadMe(){ 
    const s=await get(ref(db,`users/${me.uid}`)); meData=s.val()||{uid:me.uid, username:'Katlego'}; 
    document.getElementById('me-username').textContent = meData.username; 
}

function listenConvs(){
    onValue(ref(db,`userChats/${me.uid}`), snap=>{
        document.getElementById('skeletons')?.remove();
        let entries=[];
        if(snap.exists()){
            snap.forEach(child=>{ entries.push({chatId:child.key,...child.val()}); });
        }
        renderConvList(entries.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0)));
    });
}

function renderConvList(convs){
    const list=document.getElementById('conv-list'); list.innerHTML='';
    convs.forEach((c)=>{
        const item=document.createElement('div');
        item.className=`conv-item${c.chatId===chatId?' active':''}${c.unreadCount>0?' unread':''}`;
        item.id=`conv-${c.chatId}`;
        item.innerHTML=`
            <div class="conv-avatar-wrap"><img class="conv-avatar" src="https://ui-avatars.com/api/?name=${c.otherUid}" alt=""></div>
            <div class="conv-body">
                <div class="conv-name">User ${c.otherUid.substring(0,4)}</div>
                <div class="conv-preview-row"><span class="conv-preview">${c.lastMsg||'Started a chat'}</span></div>
            </div>
        `;
        item.addEventListener('click',()=>openChat(c.chatId,c.otherUid));
        list.appendChild(item);
    });
}

window.openChat=async(cid,uid)=>{
    chatId=cid; otherUid=uid;
    document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`conv-${cid}`)?.classList.add('active');
    document.getElementById('chat-avatar').src=`https://ui-avatars.com/api/?name=${uid}`;
    document.getElementById('chat-name').textContent=`User ${uid.substring(0,4)}`;
    
    document.getElementById('chat-empty').style.display='none';
    document.getElementById('chat-view').style.display='flex';
    document.getElementById('messages-area').innerHTML = '';
    
    if(window.innerWidth<=768){ document.getElementById('chat-pane').classList.add('open'); }
    
    // OFFLINE CAPABILITY: Load cached messages instantly
    currentChatCache = await idbGet(`cache-msgs-${cid}`) || [];
    currentChatCache.forEach(msg => renderMsgContent(msg, true));
    scrollBot();

    listenMsgs(cid);
};

window.closeChat=()=>{ document.getElementById('chat-pane').classList.remove('open'); chatId=null; document.getElementById('chat-view').style.display='none'; document.getElementById('chat-empty').style.display='flex'; };

// OFFLINE CAPABILITY: Network event listeners
window.addEventListener('online', () => { 
    document.getElementById('offline-banner').classList.remove('active');
    syncOfflineData(); 
});
window.addEventListener('offline', () => { 
    document.getElementById('offline-banner').classList.add('active'); 
});

async function syncOfflineData() {
    const pending = await idbGet('pending-msgs') || [];
    if (!pending.length) return;
    
    showToast('Connection restored. Syncing messages...');
    const stillPending = [];
    
    for (let p of pending) {
        try {
            await push(ref(db, `messages/${p.cid}/msgs`), p.msgData);
            await update(ref(db), p.upd);
        } catch(e) {
            stillPending.push(p); // keep if failed
        }
    }
    
    await idbSet('pending-msgs', stillPending);
    if(stillPending.length === 0) showToast('All pending messages sent!');
}

window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if(!text||!chatId) return;
    input.value=''; resizeInput(); 
    
    const ts=Date.now();
    const msgData={senderId:me.uid, timestamp:ts, text:text, read: false};
    const upd={};
    upd[`userChats/${me.uid}/${chatId}`]={lastTs:ts, lastMsg:text, otherUid:otherUid};
    upd[`userChats/${otherUid}/${chatId}`]={lastTs:ts, lastMsg:text, otherUid:me.uid};

    if (!navigator.onLine) {
        // OFFLINE CAPABILITY: Queue message
        const pending = await idbGet('pending-msgs') || [];
        pending.push({ cid: chatId, msgData, upd });
        await idbSet('pending-msgs', pending);
        showToast('Offline. Message queued.');
        
        // Optimistic rendering
        msgData.isPending = true;
        renderMsgContent(msgData, false);
        scrollBot();
        return;
    }
    
    await push(ref(db,`messages/${chatId}/msgs`),msgData);
    await update(ref(db),upd);
    scrollBot();
};

window.onMsgInput=()=>{ resizeInput(); const h=document.getElementById('msg-input').value.trim().length>0; const btn=document.getElementById('send-btn'); if(h){btn.classList.add('show');}else{btn.classList.remove('show');} };
window.onMsgKeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendMessage();}};
function resizeInput(){const el=document.getElementById('msg-input');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function listenMsgs(cid){
    loadedIds.clear();
    onChildAdded(ref(db,`messages/${cid}/msgs`), async snap => {
        if(loadedIds.has(snap.key)) return; loadedIds.add(snap.key);
        const msg = {id: snap.key, ...snap.val()};
        
        // Remove optimistic pending messages if exact match found (simplified logic)
        const area = document.getElementById('messages-area');
        const pendingNodes = area.querySelectorAll('.offline-msg');
        pendingNodes.forEach(n => { if(n.innerText.includes(msg.text)) n.remove(); });
        
        renderMsgContent(msg, false);
        scrollBot();

        // Save to cache
        const idx = currentChatCache.findIndex(m => m.id === msg.id);
        if(idx === -1) currentChatCache.push(msg);
        await idbSet(`cache-msgs-${cid}`, currentChatCache);
    });
}

function renderMsgContent(msg, isCached) {
    const area = document.getElementById('messages-area');
    // Prevent duplicate renders from cache vs live
    if(msg.id && document.getElementById(`msg-${msg.id}`)) return;

    const isMine = msg.senderId === me.uid;
    const row = document.createElement('div'); 
    if(msg.id) row.id = `msg-${msg.id}`;
    row.className = `msg-row ${isMine ? 'out' : 'in'} ${msg.isPending ? 'offline-msg' : ''}`;
    
    const bubbleHTML = `<div class="bubble">${escapeHtml(msg.text).replace(/\n/g,'<br>')}</div>`;
    row.innerHTML = `<div class="msg-content">${bubbleHTML}</div>`;
    area.appendChild(row);
}

function scrollBot() { const area = document.getElementById('messages-area'); if(area) setTimeout(() => { area.scrollTo({top: area.scrollHeight, behavior: 'smooth'}); }, 100); }
window.escapeHtml = (s) => {const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
</script>
</body>
